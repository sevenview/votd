# Release - Create GitHub Release and publish gem
#
# This workflow handles the complete release process:
# 1. Validates the Ruby gem builds and tests pass
# 2. Creates a GitHub Release
# 3. Publishes the gem to RubyGems (via OIDC trusted publishing)
#
# Trigger: Automatically runs when a tag matching 'v*' is pushed
#          (e.g., v4.0.0, v4.1.0)
#
# Usage: Create and push a release tag:
#        bundle exec rake release
#        # or manually:
#        git tag -a v4.0.0 -m "Release v4.0.0"
#        git push origin v4.0.0
#
# RubyGems setup:
# - Configure trusted publishing at https://rubygems.org/gems/votd/trusted_publishers
#   (GitHub repo: sevenview/votd, workflow: release.yml, environment: blank)
#
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.TAG }}
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Run tests
        run: bundle exec rspec

      - name: Verify CLI runs
        run: |
          bundle exec exe/votd version
          bundle exec exe/votd --help

      - name: Build gem
        run: gem build votd.gemspec

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: votd-${{ steps.version.outputs.VERSION }}.gem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push-to-rubygems:
    name: Push to RubyGems
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - uses: rubygems/configure-rubygems-credentials@main
      - name: Build and push gem
        run: |
          gem build votd.gemspec
          gem push votd-${{ needs.build-and-release.outputs.version }}.gem
